name: Track LLM Support

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: 'Language model ID to track'
        required: true
        type: string
      release_date:
        description: 'Release date of the model (ISO format, e.g., 2024-01-15)'
        required: true
        type: string
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'

jobs:
  track-single-model:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Track LLM support
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/track_llm_support.py \
            --model-id "${{ github.event.inputs.model_id }}" \
            --release-date "${{ github.event.inputs.release_date }}" \
            --output "data/${{ github.event.inputs.model_id }}.json"

      - name: Copy data to frontend
        run: cp data/all_models.json frontend/public/

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ frontend/public/all_models.json
          git diff --staged --quiet || git commit -m "Update LLM support data for ${{ github.event.inputs.model_id }}"
          git push

  track-all-models:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Track all models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/run_all_models.py

      - name: Copy data to frontend
        run: cp data/all_models.json frontend/public/

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ frontend/public/all_models.json
          git diff --staged --quiet || git commit -m "Update LLM support data (scheduled run)"
          git push
