name: Validate Data

on:
  pull_request:
    paths:
      - "data/**"
  push:
    branches: [main]
    paths:
      - "data/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run data validation
        run: python scripts/validate_data.py
